services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    container_name: bayzell_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    environment:
      - APP_ENV=${APP_ENV:-local}
    depends_on:
      - postgres
      - redis
    networks:
      - bayzell_net

  nginx:
    image: nginx:alpine
    container_name: bayzell_erp_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - bayzell_net

  postgres:
    image: postgres:16-alpine
    container_name: bayzell_erp_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-bayzell_erp}
      POSTGRES_USER: ${DB_USERNAME:-bayzell}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - bayzell_net

  redis:
    image: redis:7-alpine
    container_name: bayzell_erp_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-secret}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - bayzell_net

  horizon:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bayzell_erp_horizon
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan horizon
    volumes:
      - .:/var/www
    depends_on:
      - postgres
      - redis
    networks:
      - bayzell_net

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bayzell_erp_scheduler
    restart: unless-stopped
    working_dir: /var/www
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction & sleep 60; done"
    volumes:
      - .:/var/www
    depends_on:
      - postgres
      - redis
    networks:
      - bayzell_net

volumes:
  postgres_data:
  redis_data:

networks:
  bayzell_net:
    driver: bridge
